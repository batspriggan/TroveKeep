name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  docker-push:
    runs-on: docker-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: apt-get update && apt-get install -y docker.io

      - name: Log in to Codeberg container registry
        uses: https://data.forgejo.org/docker/login-action@v3
        with:
          registry: codeberg.org
          username: ${{ vars.CODEBERG_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build and push
        uses: https://data.forgejo.org/docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            codeberg.org/alessandro_battini/trovekeep:latest
            codeberg.org/alessandro_battini/trovekeep:${{ github.ref_name }}