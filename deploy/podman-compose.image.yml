services:
  # this service is optional if you already have a MongoDB instance running,
  mongo:
    image: docker.io/mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  api:
    image: codeberg.org/alessandro_battini/trovekeep:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDb__ConnectionString=mongodb://admin:password@mongo:27017 # change if you need to connect to a different MongoDB instance
      - MongoDb__DatabaseName=trovekeep
    depends_on:
      - mongo

volumes:
  mongo-data:
